apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: my-app-db
  namespace: my-app
  labels:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/part-of: gitops-test
spec:
  image: mariadb:11.4.2
  storage:
    size: 1Gi
    ephemeral: true
  replicas: 1
  port: 3306
  service:
    type: ClusterIP
  rootPasswordSecretKeyRef:
    name: mariadb-root-secret
    key: password
    generate: true
  metrics:
    enabled: false
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
  myCnf: |
    [mysqld]
    max_connections=500
