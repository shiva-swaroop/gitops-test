apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: flux-system
spec:
  ingressClass: traefik
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`traefik.gitops-test.local`)
      middlewares:
        - name: security-headers
        - name: rate-limit
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    certResolver: letsencrypt-staging
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard-http
  namespace: flux-system
spec:
  ingressClass: traefik
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`traefik.gitops-test.local`)
      middlewares:
        - name: security-headers
        - name: rate-limit
      services:
        - name: api@internal
          kind: TraefikService
