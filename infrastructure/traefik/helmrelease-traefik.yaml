apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: ">=30.0.0 <31.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 1h
  values:
    image:
      name: traefik
      tag: 3.2.3
    deployment:
      replicas: 2
    ingressClass:
      name: traefik
      enabled: true
      isDefault: true
    providers:
      kubernetesCRD:
        enabled: true
      kubernetesIngress:
        enabled: true
        allowExternalNameServices: false
    rbac:
      enabled: true
      namespaced: false
    service:
      # ClusterIP because this Virtuozzo cluster has no LB provisioner.
      # Traefik still handles Ingress routing via ClusterIP internally.
      type: ClusterIP
    ports:
      traefik:
        port: 9000
        expose:
          default: false
        exposedPort: 9000
      web:
        port: 8000
        expose:
          default: true
        exposedPort: 80
      websecure:
        port: 8443
        expose:
          default: true
        exposedPort: 443
    dashboard:
      enabled: true
      ingressRoute: false
    logs:
      general:
        level: INFO
      access:
        enabled: true
    certificatesResolvers:
      letsencrypt-staging:
        acme:
          email: admin@you-moni.com
          storage: /data/acme-staging.json
          caServer: https://acme-staging-v02.api.letsencrypt.org/directory
          httpChallenge:
            entryPoint: web
      letsencrypt-prod:
        acme:
          email: admin@you-moni.com
          storage: /data/acme-prod.json
          caServer: https://acme-v02.api.letsencrypt.org/directory
          httpChallenge:
            entryPoint: web
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 500m
