apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: flux-system
spec:
  ingressClass: traefik
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`grafana.gitops-test.local`)
      middlewares:
        - name: security-headers
        - name: rate-limit
        - name: compress
      services:
        - name: grafana
          port: 3000
  tls:
    certResolver: letsencrypt-staging
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-http
  namespace: flux-system
spec:
  ingressClass: traefik
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`grafana.gitops-test.local`)
      middlewares:
        - name: rate-limit
        - name: security-headers
      services:
        - name: grafana
          port: 3000
