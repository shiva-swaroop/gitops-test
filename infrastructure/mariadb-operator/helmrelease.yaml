apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb-operator
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: mariadb-operator
      version: ">=0.34.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: mariadb-operator
        namespace: flux-system
      interval: 1h
  values:
    crds:
      enabled: true
    replicaCount: 1
    metrics:
      enabled: false
    webhook:
      enabled: false
    certController:
      enabled: false
