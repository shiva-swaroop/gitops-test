apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-single
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-logs-single
      version: ">=0.12.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
      interval: 1h
  values:
    server:
      # Disabled because OpenStack Cinder has 0Gi volume quota on this project.
      # Log data is ephemeral — acceptable for a staging/development cluster.
      persistentVolume:
        enabled: false
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m
