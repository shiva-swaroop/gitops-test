apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: grafana
      version: ">=10.5.0 <11.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 1h
  values:
    admin:
      existingSecret: "grafana-admin-secret"
      userKey: "admin-user"
      passwordKey: "admin-password"
    persistence:
      # Disabled because OpenStack Cinder has 0Gi volume quota on this project.
      # Grafana dashboards/datasources are provisioned via Flux-managed ConfigMaps.
      enabled: false
    service:
      type: ClusterIP
      port: 3000
    sidecar:
      # skipTlsVerify required because cluster API server has a self-signed cert
      skipTlsVerify: true
      dashboards:
        enabled: true
        label: grafana_dashboard
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: VictoriaMetrics
            type: prometheus
            url: http://victoria-metrics-single-server.flux-system.svc.cluster.local:8428
            access: proxy
            isDefault: true
          - name: VictoriaLogs
            type: grafana-clickhouse-datasource
            url: http://victoria-logs-single-server.flux-system.svc.cluster.local:9428
            access: proxy
    grafana.ini:
      server:
        root_url: "%(protocol)s://%(domain)s:/"
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
