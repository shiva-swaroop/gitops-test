apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-single
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-metrics-single
      version: ">=0.38.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
      interval: 1h
  values:
    server:
      scrape:
        enabled: true
        # MariaDB operator metrics are auto-discovered via prometheus.io/scrape
        # annotations on operator pods (port 8080 /metrics).
        # For explicit static config, create a ConfigMap with scrape jobs and
        # set server.scrape.configMap: <name>
      # Disabled because OpenStack Cinder has 0Gi volume quota on this project.
      # Metrics data is ephemeral — acceptable for a staging/development cluster.
      persistentVolume:
        enabled: false
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m
